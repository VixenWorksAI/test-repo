name: build-verification

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: linux
          target: desktop
          cache: true

      - name: Build
        run: qmake Calculator.pro && make -j$(nproc)

      - name: Verify main window resource
        run: grep -q '<string>Calculator</string>' forms/mainwindow.ui

      - name: Verify File menu resource
        run: grep -q '<string>&amp;File</string>' forms/mainwindow.ui && grep -q '<string>E&amp;xit</string>' forms/mainwindow.ui

      - name: Verify Edit menu resource
        run: grep -q '<string>&amp;Edit</string>' forms/mainwindow.ui && grep -q '<string>&amp;Copy</string>' forms/mainwindow.ui && grep -q '<string>&amp;Paste</string>' forms/mainwindow.ui

      - name: Verify View menu resource
        run: grep -q '<string>&amp;View</string>' forms/mainwindow.ui && grep -q '<string>Toggle &amp;Sidebar</string>' forms/mainwindow.ui && grep -q '<string>Toggle &amp;Status Bar</string>' forms/mainwindow.ui && grep -q '<string>Zoom &amp;In</string>' forms/mainwindow.ui && grep -q '<string>Zoom &amp;Out</string>' forms/mainwindow.ui && grep -q '<string>&amp;Reset Zoom</string>' forms/mainwindow.ui

      - name: Verify Help menu resource
        run: grep -q '<string>&amp;Help</string>' forms/mainwindow.ui && grep -q '<string>&amp;About</string>' forms/mainwindow.ui && grep -q '<string>&amp;Documentation</string>' forms/mainwindow.ui
