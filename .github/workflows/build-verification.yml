name: build-verification

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: linux
          target: desktop
          modules: 'qtbase'
          cache: true

      - name: Build
        run: qmake Calculator.pro && make -j$(nproc)

      - name: Verify main window resource
        run: grep -q '<string>Calculator</string>' forms/mainwindow.ui

      - name: Verify File menu resource
        run: grep -q '<string>&amp;File</string>' forms/mainwindow.ui && grep -q '<string>E&amp;xit</string>' forms/mainwindow.ui
