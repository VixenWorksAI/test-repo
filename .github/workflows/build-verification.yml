name: build-verification

on:
  push:
    branches: [main, agent/**]
  pull_request:
    branches: [main, agent/**]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-tools-dev build-essential

      - name: Verify qmake6 is available
        run: qmake6 --version

      - name: Generate Makefile with qmake
        run: qmake6 Calculator.pro -o build/Makefile

      - name: Build with make
        run: make -C build -j$(nproc)

      - name: Verify binary was produced
        run: test -f build/Calculator
